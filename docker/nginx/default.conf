server {
    listen 80;
    server_name _;

    # Trust X-Forwarded-For from Docker internal networks (ALB → central nginx chain)
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;
    client_body_timeout  10s;
    send_timeout         10s;
    keepalive_timeout    65s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()";

    charset utf-8;

    # Vite assets have content-hashed filenames — safe to cache forever
    location ^~ /build/ {
        add_header X-Frame-Options        "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy        "strict-origin-when-cross-origin";
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()";
        add_header Cache-Control          "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Pass ALB's X-Forwarded-Proto through to PHP so Laravel generates correct https:// URLs
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

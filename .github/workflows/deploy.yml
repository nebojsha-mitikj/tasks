name: deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasks:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tasks:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasks-nginx:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tasks-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Write .env file
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Copy .env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: .env
          target: /home/ubuntu/docker-apps/tasks/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          script: |
            set -e

            cd /home/ubuntu/docker-apps/tasks
            git fetch origin
            git reset --hard origin/main

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            IMAGE_TAG="$IMAGE_TAG" docker compose pull
            IMAGE_TAG="$IMAGE_TAG" docker compose up -d --remove-orphans

            docker exec tasks-php php artisan migrate --force
            docker exec tasks-php php artisan config:cache
            docker exec tasks-php php artisan route:cache
            docker exec tasks-php php artisan view:cache
            docker exec tasks-php php artisan event:cache

            docker logout ghcr.io
